  <style>
    /* Font settings for Reports */
    .reports-container,
    .print-only-container {
      font-family: 'Noto Serif', serif;
    }


    @font-face {
      font-family: 'TAU-Urai';
      src: url('/fonts/TAU-Urai-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    .tamil-heading-font {
      font-family: 'TAU-Urai Bold', serif;
      font-weight: 700;
    }

    /* Tamil specific font */
    [lang="ta"],
    .tamil-font {
      font-family: 'TAU-Paalai', 'Noto Serif', serif;
      font-size: 14pt;
    }

    .english-font {
      font-family: 'Times New Roman', 'Times', serif;
    }

    /* Professional Rubric List (Answer Key) */
    .rubric-list {
      list-style-type: none !important;
      padding-left: 1.5rem !important;
      margin: 0.5rem 0 !important;
      width: 100%;
    }

    .rubric-list li {
      display: flex !important;
      justify-content: space-between !important;
      align-items: flex-start !important;
      gap: 1rem !important;
      padding: 0.25rem 0 0.25rem 0.2rem !important;
      border-bottom: 1px dashed #eee;
      width: 100%;
      position: relative;
    }

    .rubric-list li::before {
      content: "•";
      position: absolute;
      left: -1rem;
      top: -0.1rem;
      font-size: 1.6rem;
      line-height: 1;
      color: #333;
    }

    .rubric-list li:last-child {
      border-bottom: none;
    }

    .rubric-point {
      flex: 1;
      text-align: left;
      line-height: 1.6;
    }

    .rubric-mark {
      font-weight: bold;
      min-width: 2rem;
      text-align: right;
      color: #000;
      line-height: 1.6;
      margin-left: 8px;
    }

    /* Mark Indicator for editor - show box for feedback */
    .editor-content .mark-indicator {
      float: right;
      border: 1px solid #000;
      padding: 1px 6px;
      min-width: 32px;
      text-align: center;
      font-weight: bold;
      margin-left: 20px;
      background: #fcfcfc;
      display: block;
      border-radius: 2px;
      font-family: 'Times New Roman', 'Times', serif;
    }

    /* Mark Indicator for final view - hide box */
    .mark-indicator {
      float: right;
      min-width: 32px;
      text-align: center;
      font-weight: bold;
      margin-left: 10px;
      display: block;
      font-family: 'Times New Roman', 'Times', serif;
    }

    /* Force single borders in all tables */
    table {
      border-collapse: collapse !important;
      border-spacing: 0 !important;
      width: 100% !important;
      border: 1px solid black !important;
      /* Outer border */
    }

    th,
    td {
      border: 1px solid black !important;
      padding: 2px 4px;
      /* Professional compact look */
    }

    /* Maintain black borders for report-like tables */
    .bg-white table,
    .bg-white th,
    .bg-white td,
    .bg-gray-100 table,
    .bg-gray-100 th,
    .bg-gray-100 td,
    .reports-container table,
    .reports-container th,
    .reports-container td {
      border-color: #000 !important;
    }

    /* Disable pull-to-refresh on mobile */
    body {
      overscroll-behavior-y: contain;
    }

    /* Custom scrollbar for tables */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Global removals for professional look */
    .shadow-md,
    .shadow-sm,
    .shadow-lg,
    .shadow {
      box-shadow: none !important;
    }

    .rounded-xl,
    .rounded-lg,
    .rounded-md,
    .rounded {
      border-radius: 0 !important;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      body,
      html {
        height: auto !important;
        overflow: visible !important;
        background: white !important;
      }

      /* Fix for AdminPortal and common layouts clipping content */
      main,
      #root,
      .flex-1 {
        height: auto !important;
        overflow: visible !important;
        display: block !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      .max-w-5xl {
        max-width: none !important;
      }

      /* Report specific print styles */
      .bg-white {
        background: white !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      .reports-display-content {
        display: block !important;
      }

      .landscape-report-page {
        width: 100% !important;
        page-break-after: always;
      }

      .landscape-mode {
        page: landscape;
      }

      @page {
        size: A4;
        margin: 10mm;
      }

      @page landscape {
        size: A4 landscape;
        margin: 10mm;
      }
    }

    /* Editor Specific Styles */
    .editor-content ul {
      list-style-type: disc !important;
      padding-left: 1.5rem !important;
      margin: 0.5rem 0 !important;
    }

    .editor-content ol {
      list-style-type: decimal !important;
      padding-left: 1.5rem !important;
      margin: 0.5rem 0 !important;
    }

    .editor-content table {
      border-collapse: collapse !important;
      width: 100% !important;
      margin: 1rem 0 !important;
    }

    .editor-content th,
    .editor-content td {
      border: 1px solid black !important;
      padding: 8px !important;
      min-width: 50px;
    }

    .editor-content img {
      max-width: 100%;
      height: auto;
      margin: 1rem 0;
      border: 1px solid #eee;
      border-radius: 4px;
    }
  </style>
