<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="Exam Blueprint Generator" />
  <title>Exam Blueprint Generator</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Font settings for Reports */
    .reports-container,
    .print-only-container {
      font-family: 'Noto Serif', serif;
    }

    /* Tamil specific font */
    [lang="ta"],
    .tamil-font {
      font-family: 'TAU-Pallai', 'TAU-Palaai', 'Noto Serif', serif;
      font-size: 14px;
    }

    /* Fix for double borders in all tables */
    table {
      border-collapse: collapse !important;
      border-spacing: 0 !important;
      width: 100% !important;
    }

    th,
    td {
      border: 1px solid black !important;
    }

    /* Maintain Tailwind-like borders for specific UI tables if needed,
         but the user wants single borders everywhere.
         Wait, let's be careful not to break the main dashboard table which uses gray-200.
         Actually, the user said "அனைத்து டேபில் வியூவிலும்".
      */
    .bg-white table th,
    .bg-white table td {
      border-color: #000 !important;
      /* Force black for report-like tables */
    }

    /* Reset for dashboard tables if they look too harsh */
    .bg-gray-100 th {
      border-color: #000 !important;
    }

    /* Disable pull-to-refresh on mobile */
    body {
      overscroll-behavior-y: contain;
    }

    /* Custom scrollbar for tables */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      body,
      html {
        height: auto !important;
        overflow: visible !important;
        background: white !important;
      }

      /* Fix for AdminPortal and common layouts clipping content */
      main,
      #root,
      .flex-1 {
        height: auto !important;
        overflow: visible !important;
        display: block !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      .max-w-5xl {
        max-width: none !important;
      }

      /* Report specific print styles */
      .bg-white {
        background: white !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      .shadow-md,
      .rounded-xl,
      .rounded-lg {
        box-shadow: none !important;
        border-radius: 0 !important;
      }

      .reports-display-content {
        display: block !important;
      }

      .landscape-report-page {
        width: 100% !important;
        page-break-after: always;
      }

      .landscape-mode {
        page: landscape;
      }

      @page {
        size: A4;
        margin: 10mm;
      }

      @page landscape {
        size: A4 landscape;
        margin: 10mm;
      }
    }

    /* Editor Specific Styles */
    .editor-content ul {
      list-style-type: disc !important;
      padding-left: 1.5rem !important;
      margin: 0.5rem 0 !important;
    }

    .editor-content ol {
      list-style-type: decimal !important;
      padding-left: 1.5rem !important;
      margin: 0.5rem 0 !important;
    }

    .editor-content table {
      border-collapse: collapse !important;
      width: 100% !important;
      margin: 1rem 0 !important;
    }

    .editor-content th,
    .editor-content td {
      border: 1px solid black !important;
      padding: 8px !important;
      min-width: 50px;
    }

    .editor-content img {
      max-width: 100%;
      height: auto;
      margin: 1rem 0;
      border: 1px solid #eee;
      border-radius: 4px;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",

    "html2canvas": "https://esm.sh/html2canvas@^1.4.1",
    "jspdf": "https://esm.sh/jspdf@^4.0.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>

<body class="bg-gray-50 text-gray-900 antialiased select-none">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
