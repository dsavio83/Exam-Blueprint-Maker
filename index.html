<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="Exam Blueprint Generator" />
  <title>Exam Blueprint Generator</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Font settings for Reports */
    .reports-container,
    .print-only-container {
      font-family: 'Noto Serif', serif;
    }

    /* Tamil specific font */
    [lang="ta"],
    .tamil-font {
      font-family: 'TAU-Palaai', 'Noto Serif', serif;
    }

    /* Fix for double borders in all tables */
    table {
      border-collapse: collapse !important;
      border-spacing: 0 !important;
      width: 100% !important;
    }

    th,
    td {
      border: 1px solid black !important;
    }

    /* Maintain Tailwind-like borders for specific UI tables if needed,
         but the user wants single borders everywhere.
         Wait, let's be careful not to break the main dashboard table which uses gray-200.
         Actually, the user said "அனைத்து டேபில் வியூவிலும்".
      */
    .bg-white table th,
    .bg-white table td {
      border-color: #000 !important;
      /* Force black for report-like tables */
    }

    /* Reset for dashboard tables if they look too harsh */
    .bg-gray-100 th {
      border-color: #000 !important;
    }

    /* Disable pull-to-refresh on mobile */
    body {
      overscroll-behavior-y: contain;
    }

    /* Custom scrollbar for tables */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      @page {
        size: A4;
        margin: 10mm;
      }
    }
  </style>
